{{define "event_list"}}
<div class="page-header">
  <h1>Events</h1>
  <button class="btn btn-primary"
          hx-get="/api/v1/events/new" hx-target="#app" hx-swap="innerHTML"
          hx-push-url="/events/new">
    + New Event
  </button>
</div>

<div id="event-results">
  {{if .Events}}
  <div class="card" style="overflow:hidden;">
    <table class="table">
      <thead>
        <tr>
          <th class="table-header">Title</th>
          <th class="table-header">Type</th>
          <th class="table-header">Impact</th>
          <th class="table-header">Status</th>
          <th class="table-header">TLP</th>
          <th class="table-header">Date</th>
        </tr>
      </thead>
      <tbody>
        {{range .Events}}
        <tr class="table-row clickable"
            hx-get="/api/v1/events/{{.ID}}" hx-target="#app" hx-swap="innerHTML"
            hx-push-url="/events/{{.ID}}">
          <td class="table-cell truncate">{{.Title}}</td>
          <td class="table-cell text-sm">{{.EventType}}</td>
          <td class="table-cell"><span class="badge badge-impact-{{.Impact | lower}}">{{.Impact}}</span></td>
          <td class="table-cell"><span class="badge badge-status-{{.Status | lower}}">{{.Status}}</span></td>
          <td class="table-cell"><span class="badge badge-tlp-{{.TLP | lower}}">TLP:{{.TLP}}</span></td>
          <td class="table-cell text-sm text-muted">{{.CreatedAt | fmtTime}}</td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  <p class="text-sm text-muted" style="margin-top:.5rem;">{{.Total}} event(s) total</p>
  {{else}}
  <div class="card">
    <div class="card-body" style="text-align:center;padding:3rem;">
      <p class="text-muted">No events found.</p>
    </div>
  </div>
  {{end}}
</div>
{{end}}
