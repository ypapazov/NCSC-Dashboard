{{define "sector_form"}}
<div class="page-header">
  <h1>{{if .Sector}}Edit Sector{{else}}Create Sector{{end}}</h1>
</div>
<div class="card">
  <div class="card-body">
    <form hx-post="/api/v1/sectors" hx-target="#app" hx-swap="innerHTML">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-input" required
               value="{{if .Sector}}{{.Sector.Name}}{{end}}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn" hx-get="/api/v1/sectors" hx-target="#app" hx-swap="innerHTML" hx-push-url="/sectors">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
