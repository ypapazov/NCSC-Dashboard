{{define "admin_users"}}
<div class="page-header">
  <h1>User Management</h1>
</div>

<div id="user-list">
  {{if .Users}}
  <div class="card" style="overflow:hidden;">
    <table class="table">
      <thead>
        <tr>
          <th class="table-header">Name</th>
          <th class="table-header">Email</th>
          <th class="table-header">Primary Org</th>
          <th class="table-header">Actions</th>
        </tr>
      </thead>
      <tbody>
        {{range .Users}}
        <tr class="table-row">
          <td class="table-cell">{{.DisplayName}}</td>
          <td class="table-cell text-sm">{{.Email}}</td>
          <td class="table-cell text-sm font-mono">{{.PrimaryOrgID}}</td>
          <td class="table-cell">
            <button class="btn btn-sm"
                    hx-get="/api/v1/users/{{.ID}}" hx-target="#app" hx-swap="innerHTML"
                    hx-push-url="/users/{{.ID}}">
              View
            </button>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  <p class="text-sm text-muted" style="margin-top:.5rem;">{{.Total}} user(s) total</p>
  {{else}}
  <div class="card">
    <div class="card-body" style="text-align:center;padding:3rem;">
      <p class="text-muted">No users found.</p>
    </div>
  </div>
  {{end}}
</div>
{{end}}
