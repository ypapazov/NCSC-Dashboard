{{define "admin_orgs"}}
<div class="page-header">
  <h1>Organization Management</h1>
</div>

<div id="org-list">
  {{if .Orgs}}
  <div class="card" style="overflow:hidden;">
    <table class="table">
      <thead>
        <tr>
          <th class="table-header">Name</th>
          <th class="table-header">Sector</th>
          <th class="table-header">Created</th>
          <th class="table-header">Actions</th>
        </tr>
      </thead>
      <tbody>
        {{range .Orgs}}
        <tr class="table-row">
          <td class="table-cell">{{.Name}}</td>
          <td class="table-cell text-sm font-mono">{{.PrimarySectorID}}</td>
          <td class="table-cell text-sm text-muted">{{.CreatedAt | fmtTime}}</td>
          <td class="table-cell">
            <button class="btn btn-sm"
                    hx-get="/api/v1/orgs/{{.ID}}" hx-target="#app" hx-swap="innerHTML"
                    hx-push-url="/orgs/{{.ID}}">
              View
            </button>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <div class="card">
    <div class="card-body" style="text-align:center;padding:3rem;">
      <p class="text-muted">No organizations found.</p>
    </div>
  </div>
  {{end}}
</div>
{{end}}
