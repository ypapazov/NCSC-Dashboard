{{define "sector_detail"}}
<div class="page-header">
  <h1>{{.Sector.Name}}</h1>
</div>
<div class="card">
  <div class="card-header">Sector Details</div>
  <div class="card-body">
    <div class="meta-grid">
      <div class="meta-item">
        <div class="meta-label">ID</div>
        <div class="meta-value font-mono text-sm">{{.Sector.ID}}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Name</div>
        <div class="meta-value">{{.Sector.Name}}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Depth</div>
        <div class="meta-value">{{.Sector.Depth}}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Ancestry Path</div>
        <div class="meta-value font-mono text-sm">{{.Sector.AncestryPath}}</div>
      </div>
    </div>
  </div>
</div>
{{end}}
