{{define "org_form"}}
<div class="page-header">
  <h1>{{if .Org}}Edit Organization{{else}}Create Organization{{end}}</h1>
</div>
<div class="card">
  <div class="card-body">
    <form hx-post="/api/v1/orgs" hx-target="#app" hx-swap="innerHTML">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-input" required
               value="{{if .Org}}{{.Org.Name}}{{end}}">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a class="btn" hx-get="/api/v1/orgs" hx-target="#app" hx-swap="innerHTML" hx-push-url="/orgs">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
