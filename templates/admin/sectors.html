{{define "admin_sectors"}}
<div class="page-header">
  <h1>Sector Management</h1>
</div>

<div id="sector-tree">
  {{if .Sectors}}
  <div class="card">
    <div class="card-body">
      <div class="tree">
        {{range .Sectors}}
        <div class="tree-node">
          <div class="tree-node-header">
            <span class="tree-node-name">{{.Name}}</span>
            <span class="tree-node-meta">
              <span class="text-xs text-dim">depth {{.Depth}}</span>
              <span class="text-xs font-mono text-dim">{{.AncestryPath}}</span>
              <button class="btn btn-sm"
                      hx-get="/api/v1/sectors/{{.ID}}" hx-target="#app" hx-swap="innerHTML"
                      hx-push-url="/sectors/{{.ID}}">
                View
              </button>
            </span>
          </div>
        </div>
        {{end}}
      </div>
    </div>
  </div>
  {{else}}
  <div class="card">
    <div class="card-body" style="text-align:center;padding:3rem;">
      <p class="text-muted">No sectors defined yet.</p>
    </div>
  </div>
  {{end}}
</div>
{{end}}
