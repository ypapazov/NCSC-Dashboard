# CI: validate, build artifacts; on main — deploy help to Pages + image to GHCR; on v* tags — GitHub Release + GHCR.
#
# GitHub settings (no extra secrets required if you use GITHUB_TOKEN):
# - Pages: Settings → Pages → Build and deployment → Source: “GitHub Actions”.
# - Actions: Settings → Actions → General → Workflow permissions → “Read and write permissions”
#   (so GITHUB_TOKEN can publish releases, packages, and Pages when permitted below; fork PRs stay read-only).
# - Optional: environments → github-pages (created automatically on first deploy).
name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEMPL_VERSION: v0.3.1001

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@${{ env.TEMPL_VERSION }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Regenerate help and templ outputs
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Module integrity
        run: go mod verify

      - name: Format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:"
            echo "$out"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Test and vet (compile-check)
        run: go vet ./... && go test -count=1 ./...

      - name: Build release binaries
        env:
          CGO_ENABLED: "0"
        run: |
          set -eux
          mkdir -p dist
          build_one() {
            local goos="$1" goarch="$2"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags="-s -w" \
              -o "dist/fresnel-${goos}-${goarch}" ./cmd/fresnel
          }
          build_one linux amd64
          build_one linux arm64
          build_one darwin arm64
          build_one darwin amd64
          ls -la dist

      - name: Upload help site (for GitHub Pages)
        uses: actions/upload-artifact@v4
        with:
          name: help-site
          path: static/help/en
          if-no-files-found: error

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: fresnel-binaries-${{ github.run_id }}
          path: |
            dist/fresnel-linux-amd64
            dist/fresnel-linux-arm64
            dist/fresnel-darwin-arm64
            dist/fresnel-darwin-amd64
          if-no-files-found: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image (local load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: fresnel:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tarball
        run: docker save fresnel:ci-${{ github.sha }} | gzip -1 > fresnel-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: fresnel-docker-image-${{ github.run_id }}
          path: fresnel-image.tar.gz
          if-no-files-found: error

  deploy-help-pages:
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download help site
        uses: actions/download-artifact@v4
        with:
          name: help-site
          path: _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: fresnel-binaries-${{ github.run_id }}
          path: dist

      - name: Name release asset
        run: cp dist/fresnel-linux-amd64 "dist/fresnel-${{ github.ref_name }}-linux-amd64"

      - name: Publish GitHub Release (linux/amd64 binary)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fresnel-${{ github.ref_name }}-linux-amd64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-ghcr:
    needs: ci
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
