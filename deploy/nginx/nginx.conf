worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    upstream fresnel_api {
        server fresnel:8080;
        keepalive 32;
    }

    upstream keycloak {
        server keycloak:8080;
        keepalive 8;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Maintenance mode: touch /etc/nginx/maintenance.flag to enable.
        set $maintenance 0;
        if (-f /etc/nginx/maintenance.flag) {
            set $maintenance 1;
        }

        error_page 503 @maintenance;
        location @maintenance {
            root /etc/nginx/pages;
            rewrite ^ /maintenance.html break;
        }

        # Health endpoint always available (monitoring, deploy checks).
        location = /api/v1/health {
            include /etc/nginx/security-headers.conf;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_pass http://fresnel_api;
        }

        # --- Keycloak (proxied for OIDC browser flows) ---
        # No security-headers include — Keycloak serves its own HTML/JS/CSS
        # with inline scripts that would be blocked by the app's strict CSP.
        location /realms/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_pass http://keycloak;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
        }

        location /resources/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_pass http://keycloak;
        }

        location /js/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_pass http://keycloak;
        }

        # --- Fresnel app (security headers applied here) ---
        location / {
            if ($maintenance) { return 503; }
            include /etc/nginx/security-headers.conf;
            limit_req zone=global burst=200 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_pass http://fresnel_api;
        }

        location /api/ {
            if ($maintenance) { return 503; }
            include /etc/nginx/security-headers.conf;
            limit_req zone=api burst=100 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://fresnel_api;
        }
    }
}
