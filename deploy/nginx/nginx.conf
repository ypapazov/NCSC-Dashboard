worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;

    # Preserve X-Forwarded-Proto from upstream load balancer (ALB sends "https").
    # Fall back to $scheme for direct access (port 443 = https, port 80 = http).
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    upstream fresnel_api {
        server fresnel:8080;
        keepalive 32;
    }

    upstream keycloak {
        server keycloak:8080;
        keepalive 8;
    }

    # HTTP — used when behind ALB (ALB terminates TLS, forwards HTTP here).
    server {
        listen 80;
        server_name _;

        include /etc/nginx/fresnel-locations.conf;
    }

    # HTTPS — used for local dev and direct access (self-signed or real certs).
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/fresnel-locations.conf;
    }
}
