<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresnel — Maintenance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .card {
    max-width: 480px;
    text-align: center;
    background: #1e293b;
    border-radius: 12px;
    padding: 3rem 2.5rem;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: .75rem; color: #f8fafc; }
  p { font-size: 1rem; line-height: 1.6; color: #94a3b8; }
  .retry { margin-top: 1.5rem; font-size: .875rem; color: #64748b; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128736;</div>
  <h1>Fresnel is under maintenance</h1>
  <p>We're performing a scheduled update. This usually takes just a few minutes.</p>
  <p class="retry">This page will refresh automatically.</p>
</div>
<script>setTimeout(function(){ location.reload(); }, 30000);</script>
</body>
</html>
