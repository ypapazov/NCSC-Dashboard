# Shared location blocks for both HTTP (behind ALB) and HTTPS (local dev) servers.

# Maintenance mode: touch /etc/nginx/maintenance.flag to enable.
set $maintenance 0;
if (-f /etc/nginx/maintenance.flag) {
    set $maintenance 1;
}

error_page 503 @maintenance;
location @maintenance {
    root /etc/nginx/pages;
    rewrite ^ /maintenance.html break;
}

# Health endpoint always available (monitoring, deploy checks).
location = /api/v1/health {
    include /etc/nginx/security-headers.conf;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://fresnel_api;
}

# --- Keycloak (proxied for OIDC browser flows) ---
# No security-headers include — Keycloak serves its own HTML/JS/CSS
# with inline scripts that would be blocked by the app's strict CSP.
location /realms/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_pass http://keycloak;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
}

location /resources/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://keycloak;
}

location /js/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_pass http://keycloak;
}

# --- Fresnel app (security headers applied here) ---
location / {
    if ($maintenance) { return 503; }
    include /etc/nginx/security-headers.conf;
    limit_req zone=global burst=200 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_pass http://fresnel_api;
}

location /api/ {
    if ($maintenance) { return 503; }
    include /etc/nginx/security-headers.conf;
    limit_req zone=api burst=100 nodelay;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://fresnel_api;
}
