services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fresnel
      POSTGRES_PASSWORD: fresnel
      POSTGRES_DB: fresnel
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fresnel -d fresnel"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --hostname-strict=false --http-relative-path=/ --proxy-headers=xforwarded
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_SPI_IMPORT_DIR_STRATEGY: IGNORE_EXISTING
    volumes:
      - ./keycloak/fresnel-realm.json:/opt/keycloak/data/import/fresnel-realm.json:ro

  clamav:
    image: clamav/clamav:latest
    platform: linux/amd64
    volumes:
      - clamdata:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  fresnel:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: postgres://fresnel:fresnel@postgres:5432/fresnel?sslmode=disable
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/fresnel
      KEYCLOAK_CLIENT_ID: fresnel-app
      KEYCLOAK_EXTERNAL_URL: https://localhost/realms/fresnel
      APP_PUBLIC_URL: https://localhost
      CLAMAV_ADDRESS: clamav:3310
      ATTACHMENT_DIR: /tmp/fresnel-attachments
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/fresnel-locations.conf:/etc/nginx/fresnel-locations.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/maintenance.html:/etc/nginx/pages/maintenance.html:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - fresnel
      - keycloak

volumes:
  pgdata: {}
  clamdata: {}
