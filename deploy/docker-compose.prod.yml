# Production overrides — uses /data volume for persistent state.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires /data to be a LUKS-encrypted mount (see OPERATIONS_GUIDE.md).
services:
  postgres:
    volumes:
      - /data/pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

  keycloak:
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?Set KC_ADMIN_PASSWORD in .env}

  fresnel:
    environment:
      DATABASE_URL: postgres://fresnel:${POSTGRES_PASSWORD}@postgres:5432/fresnel?sslmode=disable
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/fresnel}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-fresnel-app}
      KEYCLOAK_EXTERNAL_URL: ${KEYCLOAK_EXTERNAL_URL}
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?Set KC_ADMIN_PASSWORD in .env}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      ATTACHMENT_DIR: /data/attachments
      FRESNEL_SKIP_DEV_SEEDS: ${FRESNEL_SKIP_DEV_SEEDS:-true}
      SES_REGION: ${SES_REGION:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@fresnel.local}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - /data/attachments:/data/attachments
